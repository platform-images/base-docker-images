# ConstraintTemplate — defines the OPA Rego logic for allowed-registry enforcement.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sallowedregistries
  annotations:
    description: >
      Enforces that all containers (including init containers) pull images
      from a set of approved registries. Pair with the K8sAllowedRegistries
      Constraint below to activate on the cluster.
spec:
  crd:
    spec:
      names:
        kind: K8sAllowedRegistries
      validation:
        openAPIV3Schema:
          type: object
          properties:
            registries:
              type: array
              description: List of approved registry prefixes (e.g. "ghcr.io/platform-images")
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sallowedregistries

        violation[{"msg": msg}] {
          container := input_containers[_]
          not registry_allowed(container.image)
          msg := sprintf(
            "container <%v> uses image <%v> from a disallowed registry. Approved registries: %v",
            [container.name, container.image, input.parameters.registries]
          )
        }

        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }

        input_containers[c] {
          c := input.review.object.spec.initContainers[_]
        }

        registry_allowed(image) {
          reg := input.parameters.registries[_]
          startswith(image, reg)
        }

---
# Constraint — activates the ConstraintTemplate above on all Pods in all namespaces.
# Adjust namespaceSelector or scope to limit enforcement if needed.
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRegistries
metadata:
  name: require-approved-registry
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
  parameters:
    registries:
      - "ghcr.io/platform-images"
