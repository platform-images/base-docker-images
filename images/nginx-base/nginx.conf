# Hardened Nginx config for non-root operation.
# No 'user' directive — the container already runs as uid 101 via the Dockerfile USER instruction.
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Suppress Nginx version from Server header and error pages
    server_tokens off;

    # Security response headers applied globally
    add_header X-Frame-Options         "SAMEORIGIN"                                    always;
    add_header X-Content-Type-Options  "nosniff"                                       always;
    add_header X-XSS-Protection        "1; mode=block"                                 always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"               always;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    server {
        # Non-root can only bind ports > 1024
        listen 8080;
        server_name _;

        location / {
            root  /var/www/html;
            index index.html index.htm;
        }

        # Unauthenticated health probe endpoint — do not expose sensitive info here
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
