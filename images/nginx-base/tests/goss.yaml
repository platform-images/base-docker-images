command:
  nginx-version:
    exec: "nginx -v"
    exit-status: 0
    stderr:
      - "/nginx version:/"
  nginx-config-test:
    exec: "nginx -t -c /etc/nginx/nginx.conf"
    exit-status: 0
    stderr:
      - "syntax is ok"
      - "test is successful"

file:
  /usr/sbin/nginx:
    exists: true
  /etc/nginx/nginx.conf:
    exists: true
    contains:
      - "server_tokens off"
      - "X-Frame-Options"
      - "Strict-Transport-Security"
      - "listen 8080"
  /etc/nginx/mime.types:
    exists: true

# Nginx runs as uid 101, not the standard nonroot uid 65532
process:
  nginx:
    running: false  # not running at image scan time; validated at container runtime
