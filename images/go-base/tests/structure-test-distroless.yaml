schemaVersion: 2.0.0

# Distroless static base — no shell, no Go toolchain, no libc.
# Only validates the runtime environment for statically compiled Go binaries.

metadataTests:
  user: "nonroot"
  labels:
    - key: "org.opencontainers.image.source"
      value: "https://github.com/platform-images/base-docker-images"
    - key: "org.opencontainers.image.licenses"
      value: "Apache-2.0"

fileExistenceTests:
  - name: "ca-certificates present (required for TLS in Go net/http)"
    path: "/etc/ssl/certs/ca-certificates.crt"
    shouldExist: true
  - name: "no shell binary"
    path: "/bin/sh"
    shouldExist: false
  - name: "no bash binary"
    path: "/bin/bash"
    shouldExist: false
  - name: "no package manager"
    path: "/usr/bin/apk"
    shouldExist: false
  - name: "no Go toolchain"
    path: "/usr/local/go/bin/go"
    shouldExist: false
